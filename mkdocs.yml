site_name: fravart.ru — Личный архив
site_url: https://fravart.ru/
docs_dir: docs
site_description: Архив совместных сессий с AI-агентом

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема

plugins:
  - search:
      lang: ru
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Главная: index.md
  - Темы:
      - projects.md
      - Школа (Москва): topics/shkola-moskva.md
      - Гран-При АУППТ: topics/gran-pri-auppt.md
      - Bioelectricity / Levin: topics/bioelectricity-levin.md
      - Почему ты стареешь: topics/pochemu-ty-stareesh.md
      - ЭОМ-спецификации: topics/eom-specs.md
      - Hermes — конфиг: topics/hermes-config.md
      - Buried Blueprints: topics/buried-blueprints.md
      - Misty Horizons — Ambient: topics/misty-horizons.md
      - Misty Horizons — стратегия роста: topics/misty-horizons-strategy.md
      - AI-модели и сервисы: topics/ai-models-experiments.md
      - Видеопродакшн — пайплайн: topics/videobooks.md
      - Уроки (Lessons): lessons-learned.md
  - Уроки ffmpeg: lessons/ffmpeg-zoompan-hetzner.md
  - Записи по дням: days.md
  - Теги: tags.md